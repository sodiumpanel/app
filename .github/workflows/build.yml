name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.5

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Sign Release APK
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks
          APK=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          ${ANDROID_HOME}/build-tools/34.0.0/zipalign -v -p 4 "$APK" app/build/outputs/apk/release/aligned.apk
          ${ANDROID_HOME}/build-tools/34.0.0/apksigner sign \
            --ks keystore.jks \
            --ks-pass pass:"$KEYSTORE_PASSWORD" \
            --ks-key-alias "$KEY_ALIAS" \
            --key-pass pass:"$KEY_PASSWORD" \
            --out app/build/outputs/apk/release/sodium-signed.apk \
            app/build/outputs/apk/release/aligned.apk

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: sodium-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: sodium-release
          path: app/build/outputs/apk/release/*.apk

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.5

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Sign Release APK
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks
          APK=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          ${ANDROID_HOME}/build-tools/34.0.0/zipalign -v -p 4 "$APK" app/build/outputs/apk/release/aligned.apk
          ${ANDROID_HOME}/build-tools/34.0.0/apksigner sign \
            --ks keystore.jks \
            --ks-pass pass:"$KEYSTORE_PASSWORD" \
            --ks-key-alias "$KEY_ALIAS" \
            --key-pass pass:"$KEY_PASSWORD" \
            --out app/build/outputs/apk/release/sodium-signed.apk \
            app/build/outputs/apk/release/aligned.apk
          rm keystore.jks

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Sodium ${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: |
            app/build/outputs/apk/release/sodium-signed.apk
